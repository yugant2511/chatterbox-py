<!DOCTYPE html>
<html>
<head>
    <title>ChatterBox Test</title>
</head>
<body>
    <h2>ChatterBox - Room: <span id="room"></span></h2>
    <div id="messages" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px;"></div>
    <br>
    <input id="message" type="text" placeholder="Type a message..." style="width:300px;">
    <button onclick="sendMessage()">Send</button>

    <script>
        const room = "general";
        document.getElementById("room").textContent = room;
        const ws = new WebSocket(`ws://localhost:8000/ws/${room}`);

        ws.onmessage = function(event) {
            const messages = document.getElementById("messages");
            messages.innerHTML += `<p>${event.data}</p>`;
            messages.scrollTop = messages.scrollHeight;
        };

        function sendMessage() {
            const input = document.getElementById("message");
            ws.send(input.value);
            input.value = "";
        }

        document.getElementById("message").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
